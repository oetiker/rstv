name: Republish (recover a half-published release)

# Finishes a release whose `version` job tagged + bumped but whose `publish`
# job died partway (e.g. one crate made it to crates.io, the other 403'd). Point
# it at the existing tag; it publishes via Trusted Publishing and skips any crate
# version already on crates.io, so it is safe to re-run.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)publish, e.g. v0.1.1'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  republish:
    name: Republish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Authenticate to crates.io (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # Publish macros first (tvision-rs depends on it), then the main crate.
      # Each is a no-op if that exact version is already indexed, and the main
      # crate retries while the macros version propagates to the index.
      - name: Publish tvision-rs-macros (skip if already published)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          out=$(cargo publish -p tvision-rs-macros 2>&1) && { echo "$out"; exit 0; }
          echo "$out"
          echo "$out" | grep -qiE "already (exists|uploaded)" \
            && { echo "tvision-rs-macros already published — skipping"; exit 0; }
          exit 1

      - name: Publish tvision-rs (skip if already published; retry on propagation)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            out=$(cargo publish -p tvision-rs 2>&1) && { echo "$out"; echo "Published on attempt $attempt"; exit 0; }
            echo "$out"
            echo "$out" | grep -qiE "already (exists|uploaded)" \
              && { echo "tvision-rs already published — skipping"; exit 0; }
            echo "Attempt $attempt failed (macros may not be indexed yet); retrying in 30s…"
            sleep 30
          done
          echo "::error::cargo publish -p tvision-rs failed after retries"
          exit 1
